name: e2e-tests

on:
  push: {}
  pull_request: {}

jobs:
  test:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: E2E Test
        uses: dagger/dagger-for-github@v7
        with:
          workdir: ci
          verb: call
          args: -s --name e2e new-interlink test stdout
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: "0.19.2"
