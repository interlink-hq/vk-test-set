## Secret envFrom Test
##
## Tests environment variable injection using envFrom with secretRef.
## This validates that the virtual kubelet properly implements
## bulk secret import where all keys in a Secret are exposed as
## environment variables.
##
## Difference from secretKeyRef:
##  * secretKeyRef: imports individual keys with custom env var names
##  * secretRef (envFrom): imports ALL keys from a Secret automatically
##

apiVersion: v1
kind: Secret
metadata:
  name: app-credentials-{{ uuid }}
  namespace: {{ namespace }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@localhost:5432/mydb"
  API_KEY: "sk-1234567890abcdef"
  SERVICE_TOKEN: "token-xyz-789"
  CACHE_HOST: "redis.example.com:6379"
  LOG_LEVEL: "debug"

---

apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials-{{ uuid }}
  namespace: {{ namespace }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
  AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  AWS_DEFAULT_REGION: "us-west-2"

---

apiVersion: v1
kind: Pod
metadata:
  name: secret-envfrom-test-{{ uuid }}
  namespace: {{ namespace }}
  annotations: {{ annotations | tojson }}
  labels:
    app: secret-envfrom-test
    test-id: "{{ uuid }}"

spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: {{ target_node }}

  containers:
  - name: env-test-container
    image: python:alpine
    command: ["python", "-c"]
    args:
      - |
        import os
        import sys

        print("=== Testing envFrom with secretRef ===\n")

        # Expected variables from app-credentials secret
        app_vars = [
            'DATABASE_URL',
            'API_KEY',
            'SERVICE_TOKEN',
            'CACHE_HOST',
            'LOG_LEVEL'
        ]

        # Expected variables from aws-credentials secret
        aws_vars = [
            'AWS_ACCESS_KEY_ID',
            'AWS_SECRET_ACCESS_KEY',
            'AWS_DEFAULT_REGION'
        ]

        print("--- App Credentials Secret ---")
        missing_app = []
        for var in app_vars:
            value = os.environ.get(var)
            if value:
                # Mask sensitive values in logs
                if any(x in var for x in ['KEY', 'TOKEN', 'PASSWORD', 'SECRET']):
                    masked = value[:4] + '***' + value[-4:] if len(value) > 8 else '***'
                    print(f"✓ {var}: {masked}")
                else:
                    print(f"✓ {var}: {value}")
            else:
                print(f"✗ {var}: NOT_SET")
                missing_app.append(var)

        print("\n--- AWS Credentials Secret ---")
        missing_aws = []
        for var in aws_vars:
            value = os.environ.get(var)
            if value:
                if any(x in var for x in ['KEY', 'SECRET']):
                    masked = value[:4] + '***' + value[-4:] if len(value) > 8 else '***'
                    print(f"✓ {var}: {masked}")
                else:
                    print(f"✓ {var}: {value}")
            else:
                print(f"✗ {var}: NOT_SET")
                missing_aws.append(var)

        # Check for unexpected prefix (some implementations add prefixes)
        print("\n--- Checking for prefixed variables ---")
        prefixed_found = False
        for key in os.environ:
            if any(key.endswith(v) and key != v for v in app_vars + aws_vars):
                print(f"! Found prefixed variable: {key}")
                prefixed_found = True
        if not prefixed_found:
            print("✓ No prefixed variables found (correct behavior)")

        print("\n=== Test Results ===")
        if missing_app or missing_aws:
            print(f"FAILED: Missing {len(missing_app) + len(missing_aws)} variables")
            sys.exit(1)
        else:
            print("SUCCESS: All environment variables from secretRef are present")
            print("envFrom secretRef test completed successfully")

    envFrom:
      # Import all keys from app-credentials secret
      - secretRef:
          name: app-credentials-{{ uuid }}

      # Import all keys from aws-credentials secret
      - secretRef:
          name: aws-credentials-{{ uuid }}

    imagePullPolicy: Always

  dnsPolicy: ClusterFirst
  tolerations: {{ tolerations | tojson }}

################################################################################
# VALIDATION
timeout_seconds: 20
check_pods:
  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}

check_logs:
  # Verify app credentials secret variables
  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ DATABASE_URL: postgresql"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ API_KEY: sk-1"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ SERVICE_TOKEN: toke"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ CACHE_HOST: redis.example.com:6379"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ LOG_LEVEL: debug"
    operator: Exists

  # Verify AWS credentials secret variables
  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ AWS_ACCESS_KEY_ID: AKIA"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ AWS_SECRET_ACCESS_KEY: wJal"
    operator: Exists

  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "✓ AWS_DEFAULT_REGION: us-west-2"
    operator: Exists

  # Verify test completion
  - name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    regex: "envFrom secretRef test completed successfully"
    operator: Exists

clean_configs:
  - type: pod
    name: secret-envfrom-test-{{ uuid }}
    namespace: {{ namespace }}
    condition: onSuccess

  - type: secret
    name: app-credentials-{{ uuid }}
    namespace: {{ namespace }}
    condition: always

  - type: secret
    name: aws-credentials-{{ uuid }}
    namespace: {{ namespace }}
    condition: always
