## Mesh Network Opt-Out Annotation Test
##
## Tests that a pod with the interlink.eu/mesh-network: disabled annotation
## runs successfully. This validates the behavior introduced in
## https://github.com/interlink-hq/interLink/pull/522.
##
## When this annotation is set, the virtual kubelet skips full mesh
## networking setup while still running the pod normally.
{%- set mesh_ann = dict(annotations) -%}
{%- set _ = mesh_ann.update({"interlink.eu/mesh-network": "disabled"}) -%}

apiVersion: v1
kind: Pod
metadata:
  name: mesh-opt-out-{{ uuid }}
  namespace: {{ namespace }}
  annotations: {{ mesh_ann | tojson }}

spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: {{ target_node }}

  containers:
  - name: main
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Pod with mesh opt-out annotation running"
        echo "MESH_OPT_OUT_TEST_PASSED"
    imagePullPolicy: Always

  dnsPolicy: ClusterFirst
  tolerations: {{ tolerations | tojson }}

################################################################################
# VALIDATION
timeout_seconds: 60

check_pods:
  - name: mesh-opt-out-{{ uuid }}
    namespace: {{ namespace }}
    status: Succeeded

check_logs:
  - name: mesh-opt-out-{{ uuid }}
    namespace: {{ namespace }}
    container: main
    regex: "MESH_OPT_OUT_TEST_PASSED"
    operator: Exists

clean_configs:
  - type: pod
    name: mesh-opt-out-{{ uuid }}
    namespace: {{ namespace }}
    condition: always
