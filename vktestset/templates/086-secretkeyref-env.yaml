## Secret KeyRef Environment Variable Test
##
## Regression test for https://github.com/interlink-hq/interLink/issues/438
##
## Tests that environment variables can be sourced from a Secret using
## secretKeyRef in the env.valueFrom field. This was a regression where
## pods would remain in Pending state with "secret not found" errors in
## the interLink VK logs, despite the Secret existing in the cluster.
##
## Closely mirrors the reproduction case from the issue:
##  - A standalone Secret is created
##  - A Pod references the Secret via env.valueFrom.secretKeyRef
##  - The env var name differs from the secret key name (matching the issue)

apiVersion: v1
kind: Secret
metadata:
  name: secretkeyref-test-{{ uuid }}
  namespace: {{ namespace }}
type: Opaque
stringData:
  testfile: "hello-from-secret"

---

apiVersion: v1
kind: Pod
metadata:
  name: secretkeyref-env-{{ uuid }}
  namespace: {{ namespace }}
  annotations: {{ annotations | tojson }}
  labels:
    app: secretkeyref-env-test
    test-id: "{{ uuid }}"

spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: {{ target_node }}

  containers:
  - name: secretkeyref-container
    image: alpine:3
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "MY_SECRET_VAR=${MY_SECRET_VAR}"
        if [ "${MY_SECRET_VAR}" = "hello-from-secret" ]; then
          echo "secretKeyRef env test passed"
        else
          echo "secretKeyRef env test failed: expected 'hello-from-secret', got '${MY_SECRET_VAR}'"
          exit 1
        fi

    env:
      - name: MY_SECRET_VAR
        valueFrom:
          secretKeyRef:
            name: secretkeyref-test-{{ uuid }}
            key: testfile

    imagePullPolicy: Always

  dnsPolicy: ClusterFirst
  tolerations: {{ tolerations | tojson }}

################################################################################
# VALIDATION
timeout_seconds: 15
check_pods:
  - name: secretkeyref-env-{{ uuid }}
    namespace: {{ namespace }}

check_logs:
  - name: secretkeyref-env-{{ uuid }}
    namespace: {{ namespace }}
    regex: "secretKeyRef env test passed"
    operator: Exists

clean_configs:
  - type: pod
    name: secretkeyref-env-{{ uuid }}
    namespace: {{ namespace }}
    condition: onSuccess

  - type: secret
    name: secretkeyref-test-{{ uuid }}
    namespace: {{ namespace }}
    condition: always
